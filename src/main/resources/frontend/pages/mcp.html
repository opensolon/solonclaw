<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw - MCP 管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==================== 设计系统变量 ==================== */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --neutral-50: #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-200: #e5e7eb;
            --neutral-300: #d1d5db;
            --neutral-400: #9ca3af;
            --neutral-500: #6b7280;
            --neutral-600: #4b5563;
            --neutral-700: #374151;
            --neutral-800: #1f2937;
            --neutral-900: #111827;

            --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            --card-hover-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

            --transition-fast: 150ms ease-in-out;
            --transition-normal: 200ms ease-in-out;
            --transition-slow: 300ms ease-in-out;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--neutral-100);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== 滚动条 ==================== */
        .custom-scroll::-webkit-scrollbar {
            width: 7px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: var(--neutral-100);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--neutral-300);
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--neutral-400);
        }

        /* ==================== MCP 服务器卡片 ==================== */
        .server-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--neutral-200);
            padding: 20px;
            box-shadow: var(--card-shadow);
            transition: all var(--transition-normal);
            margin-bottom: 12px;
        }
        .server-card:hover {
            box-shadow: var(--card-hover-shadow);
            transform: translateY(-1px);
        }

        /* ==================== 状态标签 ==================== */
        .status-badge {
            padding: 6px 12px;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-badge.running {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .status-badge.stopped {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* ==================== 按钮 ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-secondary {
            background: white;
            color: var(--neutral-700);
            border: 1px solid var(--neutral-200);
        }
        .btn-secondary:hover {
            background: var(--neutral-50);
            border-color: var(--neutral-300);
        }
        .btn-success {
            background: var(--success-color);
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-danger {
            background: var(--danger-color);
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-sm {
            padding: 8px 12px;
            font-size: 13px;
        }

        /* ==================== 模态框 ==================== */
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* ==================== 表单 ==================== */
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--neutral-700);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--neutral-200);
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all var(--transition-fast);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* ==================== 焦点可见性 ==================== */
        *:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }
        button:focus-visible {
            outline-offset: 3px;
        }
    </style>
</head>
<body class="h-full overflow-y-auto custom-scroll p-5">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200">
        <div class="border-b border-gray-200 flex items-center justify-between px-5 py-4">
            <h2 class="text-lg font-bold text-gray-900 tracking-tight">MCP 服务器管理</h2>
            <div class="flex space-x-2">
                <button onclick="startAllServers()" class="btn btn-success btn-sm">全部启动</button>
                <button onclick="stopAllServers()" class="btn btn-danger btn-sm">全部停止</button>
                <button onclick="openAddServerModal()" class="btn btn-primary btn-sm">
                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    添加服务器
                </button>
            </div>
        </div>
        <div id="mcpContent" class="p-5">
            <div class="flex items-center justify-center h-40 text-gray-400">
                <span class="font-medium">加载中...</span>
            </div>
        </div>
    </div>

    <!-- 添加服务器模态框 -->
    <div id="addServerModal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center z-50">
        <div class="modal-content p-6 w-full max-w-md mx-4">
            <h3 class="text-xl font-bold text-gray-900 mb-5 tracking-tight">添加 MCP 服务器</h3>
            <form id="addServerForm" onsubmit="addServer(event)">
                <div class="mb-4">
                    <label class="form-label">服务器名称</label>
                    <input type="text" id="serverName" required class="form-input">
                </div>
                <div class="mb-4">
                    <label class="form-label">命令</label>
                    <input type="text" id="serverCommand" required class="form-input" placeholder="例如: npx, uvx">
                </div>
                <div class="mb-5">
                    <label class="form-label">参数</label>
                    <input type="text" id="serverArgs" class="form-input" placeholder="例如: @modelcontextprotocol/server-github">
                </div>
                <div class="flex space-x-3">
                    <button type="button" onclick="closeAddServerModal()" class="btn btn-secondary flex-1">取消</button>
                    <button type="submit" class="btn btn-primary flex-1">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../RequestUtil.js?v=1.0"></script>
    <script src="mcp.js?v=1.0"></script>
</body>
</html>
