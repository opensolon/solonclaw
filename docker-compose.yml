version: '3.8'

services:
  solonclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: solonclaw:latest
    container_name: solonclaw
    ports:
      - "41234:41234"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CALLBACK_URL=${CALLBACK_URL:-}
      - CALLBACK_SECRET=${CALLBACK_SECRET:-}
      - SOLON_ENV=prod
      - JAVA_OPTS=-Xms512m -Xmx1g -XX:+UseG1GC
    volumes:
      - solonclaw-workspace:/app/workspace
      - solonclaw-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:41234/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - solonclaw-network

volumes:
  solonclaw-workspace:
    driver: local
  solonclaw-logs:
    driver: local

networks:
  solonclaw-network:
    driver: bridge