solon:
  app:
    name: solonclaw
  env: dev

server:
  port: 12345

  # ==================== Solon AI 配置 ====================
  ai:
    chat:
      openai:
        apiUrl: "https://api.jimuqu.com/v1/chat/completions"
        apiKey: "sk-nioMU8aKO7nD9khcOt3hQfQAyBTkRh011AII1kk3gRtQnKcf"
        provider: "openai"
        model: "glm-4.7"
        temperature: 0.7
        maxTokens: 4096

  # ==================== 序列化配置 ====================
  serialization:
    json:
      dateAsFormat: 'yyyy-MM-dd HH:mm:ss'
      dateAsTimeZone: 'GMT+8'
      nullAsWriteable: true

# ==================== SolonClaw 配置 ====================
solonclaw:
  workspace: "./workspace"

  directories:
    skillsDir: "skills"
    jobsFile: "jobs.json"
    jobHistoryFile: "job-history.json"
    database: "memory.db"
    shellWorkspace: "workspace"
    logsDir: "logs"
    autonomousStateFile: "autonomous-state.json"

  defaults:
    temperature: 0.7
    maxTokens: 4096
    timeoutSeconds: 120

  agent:
    model:
      primary: "openai/gpt-4"
    maxHistoryMessages: 50
    maxToolIterations: 25

  tools:
    shell:
      enabled: true
      timeoutSeconds: 60
      maxOutputBytes: 1048576

  memory:
    enabled: true
    session:
      maxHistory: 50
    store:
      enabled: true

  callback:
    enabled: true
    url: "${CALLBACK_URL:}"
    secret: "${CALLBACK_SECRET:}"

  # ==================== 上下文构建器配置 ====================
  context:
    builder:
      # 组件启用状态
      system:
        enabled: true
        includeTools: true                # 是否将工具描述包含在系统上下文中

      tools:
        enabled: false                    # 如果系统上下文已包含工具，这里可以禁用
        includeParameters: true

      knowledge:
        enabled: true
        maxSearchResults: 5               # 最大搜索结果数
        minConfidenceThreshold: 0.6       # 最小置信度阈值

      session:
        enabled: true
        maxHistoryMessages: 10            # 最大历史消息数
        maxSummaryLength: 500             # 会话摘要长度限制（字符数）

  # ==================== 学习系统配置 ====================
  learning:
    enabled: true

    # 反思配置
    reflection:
      cron: "0 0 * * * ?"              # 每小时执行一次反思
      timeWindowHours: 1               # 分析最近1小时的数据
      maxMessagesPerReflection: 200    # 每次反思最多处理的消息数

    # 自动技能配置
    autoSkill:
      processCron: "0 */15 * * * ?"    # 每15分钟处理一次技能请求
      minConfidenceThreshold: 0.8      # AI 置信度阈值
      realtimeAnalysisEnabled: true    # 启用实时技能需求分析

    # 知识库配置
    knowledge:
      maxSearchResults: 5              # 最大搜索结果数
      minConfidenceThreshold: 0.6      # 最小置信度阈值

  # ==================== 自主运行配置 ====================
  autonomous:
    enabled: true                      # 是否启用自主运行

    runCron: "0/30 * * * * ?"         # 运行循环 cron（每30秒）
    maxConcurrentTasks: 3             # 最大并发任务数
    taskTimeoutSeconds: 300           # 任务超时时间（秒）
    maxGoals: 20                       # 目标最大数量
    maxTaskQueueSize: 100             # 任务队列最大大小

    autoSkillInstall: true             # 是否启用自动技能安装
    autoReflection: true               # 是否启用自动反思

    decisionConfidenceThreshold: 0.7   # 决策引擎置信度阈值
    cleanupIntervalHours: 24           # 资源清理间隔（小时）