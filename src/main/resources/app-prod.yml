solon:
  port: 41234
  env: prod
  logging:
    level:
      root: INFO
      com.jimuqu.solonclaw: INFO

  # ==================== Solon AI 配置 ====================
  ai:
    chat:
      openai:
        apiUrl: "https://api.jimuqu.com/v1/chat/completions"
        apiKey: "${OPENAI_API_KEY:}"
        provider: "openai"
        model: "glm-4.7"
        temperature: 0.7
        maxTokens: 4096

solonclaw:
  workspace: "./workspace"

  directories:
    mcpConfig: "mcp.json"
    skillsDir: "skills"
    jobsFile: "jobs.json"
    jobHistoryFile: "job-history.json"
    database: "memory.db"
    shellWorkspace: "workspace"
    logsDir: "logs"

  agent:
    maxHistoryMessages: 50
    maxToolIterations: 25

  tools:
    shell:
      enabled: true
      timeoutSeconds: 60

  memory:
    enabled: true
