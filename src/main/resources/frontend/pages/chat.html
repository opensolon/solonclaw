<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw - 对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==================== 设计系统变量 ==================== */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #10b981;
            --neutral-50: #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-200: #e5e7eb;
            --neutral-300: #d1d5db;
            --neutral-400: #9ca3af;
            --neutral-500: #6b7280;
            --neutral-600: #4b5563;
            --neutral-700: #374151;
            --neutral-800: #1f2937;
            --neutral-900: #111827;

            --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            --card-hover-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

            --transition-fast: 150ms ease-in-out;
            --transition-normal: 200ms ease-in-out;
            --transition-slow: 300ms ease-in-out;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--neutral-100);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== 滚动条 ==================== */
        .chat-container::-webkit-scrollbar,
        .session-list::-webkit-scrollbar {
            width: 7px;
        }
        .chat-container::-webkit-scrollbar-track,
        .session-list::-webkit-scrollbar-track {
            background: var(--neutral-100);
        }
        .chat-container::-webkit-scrollbar-thumb,
        .session-list::-webkit-scrollbar-thumb {
            background: var(--neutral-300);
            border-radius: 4px;
        }
        .chat-container::-webkit-scrollbar-thumb:hover,
        .session-list::-webkit-scrollbar-thumb:hover {
            background: var(--neutral-400);
        }

        /* ==================== 消息卡片 ==================== */
        .message-bubble {
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
        }
        .message-bubble.user {
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: var(--radius-sm);
        }
        .message-bubble.assistant {
            background: white;
            color: var(--neutral-800);
            border: 1px solid var(--neutral-200);
            border-bottom-left-radius: var(--radius-sm);
        }

        /* ==================== 输入框 ==================== */
        .input-wrapper {
            background: white;
            border: 1px solid var(--neutral-200);
            border-radius: var(--radius-xl);
            padding: 12px 16px;
            box-shadow: var(--card-shadow);
            transition: box-shadow var(--transition-normal);
        }
        .input-wrapper:focus-within {
            box-shadow: var(--card-hover-shadow), 0 0 0 2px rgba(37, 99, 235, 0.1);
            border-color: var(--primary-color);
        }
        .textarea-input {
            resize: none;
            border: none;
            outline: none;
            line-height: 1.5;
            max-height: 120px;
        }

        /* ==================== 会话列表项 ==================== */
        .session-item {
            padding: 12px 14px;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            cursor: pointer;
            border: 1px solid transparent;
        }
        .session-item:hover {
            background: var(--neutral-100);
            border-color: var(--neutral-200);
        }
        .session-item.active {
            background: rgba(37, 99, 235, 0.08);
            border-color: rgba(37, 99, 235, 0.2);
        }
        .session-item.active .session-title {
            color: var(--primary-color);
            font-weight: 500;
        }

        /* ==================== 按钮 ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-primary:disabled {
            background: var(--neutral-300);
            cursor: not-allowed;
        }
        .btn-icon {
            padding: 10px;
            border-radius: var(--radius-md);
            background: var(--neutral-100);
            border: 1px solid var(--neutral-200);
            transition: all var(--transition-normal);
        }
        .btn-icon:hover {
            background: var(--neutral-200);
        }

        /* ==================== Markdown 样式 ==================== */
        .markdown-content pre {
            background: var(--neutral-900);
            color: #e5e7eb;
            padding: 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 12px 0;
        }
        .markdown-content code {
            background: var(--neutral-100);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
        }
        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }
        .markdown-content ul {
            list-style: disc;
            margin-left: 20px;
            margin: 8px 0 8px 20px;
        }
        .markdown-content ol {
            list-style: decimal;
            margin-left: 20px;
            margin: 8px 0 8px 20px;
        }
        .markdown-content li {
            margin: 6px 0;
            line-height: 1.6;
        }
        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
            border: 1px solid var(--neutral-200);
            border-radius: var(--radius-md);
            overflow: hidden;
        }
        .markdown-content th,
        .markdown-content td {
            border: 1px solid var(--neutral-200);
            padding: 12px 14px;
            text-align: left;
        }
        .markdown-content th {
            background: var(--neutral-50);
            font-weight: 600;
            color: var(--neutral-700);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .markdown-content tr:hover {
            background: var(--neutral-50);
        }
        .markdown-content p {
            margin: 8px 0;
            line-height: 1.7;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            font-weight: 600;
            margin: 16px 0 10px;
            color: var(--neutral-800);
        }
        .markdown-content h1 { font-size: 20px; }
        .markdown-content h2 { font-size: 18px; }
        .markdown-content h3 { font-size: 16px; }
        .markdown-content blockquote {
            border-left: 3px solid var(--primary-color);
            padding-left: 14px;
            margin: 12px 0;
            color: var(--neutral-600);
            font-style: italic;
        }

        /* ==================== 动画 ==================== */
        .message-enter {
            animation: messageFadeIn 300ms ease-out;
        }
        @keyframes messageFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 焦点可见性 ==================== */
        *:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }
        button:focus-visible {
            outline-offset: 3px;
        }
    </style>
</head>
<body class="h-screen overflow-hidden p-5">
    <div class="flex h-full bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
        <!-- 左侧历史会话侧边栏 -->
        <div class="w-68 bg-white border-r border-gray-200 flex flex-col h-full">
            <!-- 新建会话按钮 -->
            <div class="p-4 border-b border-gray-200">
                <button
                    id="newSessionButton"
                    class="btn btn-primary w-full"
                    aria-label="新建会话"
                >
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    新建会话
                </button>
            </div>

            <!-- 历史会话列表 -->
            <div class="flex-1 overflow-y-auto session-list">
                <div class="p-4">
                    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3 px-1">历史会话</h3>
                    <div id="sessionList" class="space-y-2">
                        <div class="text-center text-gray-400 py-8 text-sm">
                            暂无历史会话
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧对话框 -->
        <div class="flex-1 flex flex-col bg-white h-full overflow-hidden">
            <!-- 聊天消息容器 -->
            <div id="chatContainer" class="chat-container flex-1 overflow-y-auto p-6 space-y-5">
                <!-- 欢迎消息 -->
                <div class="flex justify-start message-enter">
                    <div class="message-bubble assistant max-w-[80%] markdown-content">
                        <div class="font-semibold mb-2">欢迎使用 SolonClaw 👋</div>
                        <div class="text-gray-600">我是您的智能助手,可以帮助您执行各种任务。请在下方输入您的问题或需求。</div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="border-t border-gray-200 bg-gray-50 p-5">
                <div class="flex items-center space-x-3">
                    <div class="flex-1 input-wrapper">
                        <textarea
                            id="messageInput"
                            rows="1"
                            class="textarea-input w-full min-h-[44px]"
                            placeholder="输入您的问题..."
                            style="max-height: 120px;"
                            aria-label="输入您的问题或需求"
                        ></textarea>
                    </div>
                    <button
                        id="sendButton"
                        class="btn btn-primary btn-icon disabled:bg-gray-300"
                        aria-label="发送消息"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                    <button
                        id="clearButton"
                        class="btn btn-icon"
                        title="清空对话"
                        aria-label="清空对话"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
                <div class="mt-3 flex items-center justify-between text-xs text-gray-500">
                    <span class="font-medium">按 Enter 发送,Shift+Enter 换行</span>
                    <span id="charCount" class="font-medium">0 / 2000</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 flex items-center space-x-4 shadow-xl">
            <div class="w-8 h-8 border-3 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-gray-700 font-medium">处理中...</span>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="hidden fixed top-5 right-5 px-5 py-3 rounded-lg shadow-xl z-50 transition-all duration-300 font-medium text-sm"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../RequestUtil.js?v=1.0"></script>
    <script src="chat.js?v=1.0"></script>
</body>
</html>
