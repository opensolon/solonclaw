<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滚动条样式 */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        /* 打字动画光标 */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 消息淡入动画 */
        .message-fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown 内容样式 */
        .markdown-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .markdown-content code {
            background: #f3f4f6;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
        }
        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .markdown-content li {
            margin: 0.25rem 0;
        }
        .markdown-content p {
            margin: 0.5rem 0;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            font-weight: 600;
            margin: 1rem 0 0.5rem;
        }
        .markdown-content blockquote {
            border-left: 4px solid #e5e7eb;
            padding-left: 1rem;
            margin: 0.5rem 0;
            color: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <!-- 头部导航 -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold">SolonClaw</h1>
                    <p class="text-blue-100 text-sm">AI Agent 智能助手</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <a href="autonomous.html" class="flex items-center space-x-1 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    <span class="text-sm">自主任务</span>
                </a>
                <span id="statusIndicator" class="flex items-center text-sm">
                    <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
                    已连接
                </span>
            </div>
        </div>
    </header>

    <!-- 主聊天区域 -->
    <main class="flex-1 max-w-4xl w-full mx-auto flex flex-col bg-white shadow-xl">
        <!-- 聊天消息容器 -->
        <div id="chatContainer" class="chat-container flex-1 overflow-y-auto p-4 space-y-4">
            <!-- 欢迎消息 -->
            <div class="flex justify-center">
                <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl p-6 max-w-md text-center">
                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-800 mb-2">欢迎使用 SolonClaw</h2>
                    <p class="text-gray-600 text-sm">我是您的智能助手，可以帮助您执行各种任务。请在下方输入您的问题或需求。</p>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="border-t bg-gray-50 p-4">
            <div class="flex items-end space-x-3">
                <div class="flex-1 relative">
                    <textarea
                        id="messageInput"
                        rows="1"
                        class="w-full resize-none rounded-2xl border border-gray-300 px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                        placeholder="输入您的问题..."
                        style="max-height: 120px;"
                    ></textarea>
                    <button
                        id="sendButton"
                        class="absolute right-2 bottom-2 w-9 h-9 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-xl flex items-center justify-center transition-colors duration-200"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                </div>
                <button
                    id="clearButton"
                    class="w-10 h-10 bg-gray-200 hover:bg-gray-300 text-gray-600 rounded-xl flex items-center justify-center transition-colors duration-200"
                    title="清空对话"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                </button>
            </div>
            <div class="mt-2 flex items-center justify-between text-xs text-gray-500">
                <span>按 Enter 发送，Shift+Enter 换行</span>
                <span id="charCount">0 / 2000</span>
            </div>
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 flex items-center space-x-4">
            <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-gray-700">处理中...</span>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="hidden fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 transition-all duration-300"></div>

    <!-- 添加版本号以避免浏览器缓存 -->
    <script src="app.js?v=2.0"></script>
</body>
</html>
