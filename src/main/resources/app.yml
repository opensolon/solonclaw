solon:
  app:
    name: solonclaw
  port: 41234
  env: dev

  # ==================== Solon AI 配置 ====================
  ai:
    chat:
      openai:
        apiUrl: "https://api.jimuqu.com/v1/chat/completions"
        apiKey: "sk-nioMU8aKO7nD9khcOt3hQfQAyBTkRh011AII1kk3gRtQnKcf"
        provider: "openai"
        model: "glm-4.7"
        temperature: 0.7
        maxTokens: 4096

  # ==================== 序列化配置 ====================
  serialization:
    json:
      dateAsFormat: 'yyyy-MM-dd HH:mm:ss'
      dateAsTimeZone: 'GMT+8'
      nullAsWriteable: true

# ==================== SolonClaw 配置 ====================
nullclaw:
  workspace: "./workspace"

  directories:
    mcpConfig: "mcp.json"
    skillsDir: "skills"
    jobsFile: "jobs.json"
    jobHistoryFile: "job-history.json"
    database: "memory.db"
    shellWorkspace: "workspace"
    logsDir: "logs"

  defaults:
    temperature: 0.7
    maxTokens: 4096
    timeoutSeconds: 120

  agent:
    model:
      primary: "openai/gpt-4"
    maxHistoryMessages: 50
    maxToolIterations: 25

  tools:
    shell:
      enabled: true
      timeoutSeconds: 60
      maxOutputBytes: 1048576

  memory:
    enabled: true
    session:
      maxHistory: 50
    store:
      enabled: true

  callback:
    enabled: true
    url: "${CALLBACK_URL:}"
    secret: "${CALLBACK_SECRET:}"