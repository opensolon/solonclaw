server.port: 8080
solon.app.name: solon-claw

solon.logging.appender.console.level: INFO
solon.logging.appender.console.pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{48} - %msg%n%ex"
solon.logging.appender.file.level: INFO
solon.logging.appender.file.pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{48} - %msg%n%ex"
solon.logging.appender.file.maxFileSize: 10 MB
solon.logging.appender.file.maxHistory: 7
solon.logging.logger.root.level: INFO

# 运行时目录配置
solonclaw.runtime.home: runtime

# Dashboard and API shared access token.
solonclaw.dashboard.accessToken: admin

# 默认大模型配置
providers.default.name: DefaultProvider
providers.default.baseUrl: https://api.openai.com
providers.default.apiKey:
providers.default.defaultModel: gpt-5.4
providers.default.dialect: openai
model.providerKey: default
model.default:
solonclaw.llm.stream: true
solonclaw.llm.reasoningEffort: medium
solonclaw.llm.temperature: 0.2
solonclaw.llm.maxTokens: 4096
solonclaw.llm.contextWindowTokens: 128000

# 定时任务调度
solonclaw.scheduler.enabled: true
solonclaw.scheduler.tickSeconds: 60

# 上下文压缩
solonclaw.compression.enabled: true
solonclaw.compression.thresholdPercent: 0.5
solonclaw.compression.summaryModel:
solonclaw.compression.protectHeadMessages: 3
solonclaw.compression.tailRatio: 0.2

# 主回复后的自动学习
solonclaw.learning.enabled: true
solonclaw.learning.toolCallThreshold: 5

# HEARTBEAT.md 周期轮询
solonclaw.agent.heartbeat.intervalMinutes: 15

# 文件快照与回滚
solonclaw.rollback.enabled: true
solonclaw.rollback.maxCheckpointsPerSource: 20

# 聊天窗口显示
solonclaw.display.toolProgress: all
solonclaw.display.showReasoning: false
solonclaw.display.toolPreviewLength: 80
solonclaw.display.progressThrottleMs: 1500

# ReAct 推理控制
solonclaw.react.maxSteps: 12
solonclaw.react.retryMax: 3
solonclaw.react.retryDelayMs: 2000
solonclaw.react.delegateMaxSteps: 18
solonclaw.react.delegateRetryMax: 4
solonclaw.react.delegateRetryDelayMs: 2500
solonclaw.react.summarizationEnabled: true
solonclaw.react.summarizationMaxMessages: 40
solonclaw.react.summarizationMaxTokens: 32000

# 预定义人格
solonclaw.agent.personalities.helpful.description: 友好、通用的默认助手
solonclaw.agent.personalities.helpful.systemPrompt: 你是一个友好、可靠的中文技术助手，优先给出准确、可执行的答案。
solonclaw.agent.personalities.concise.description: 简洁直接，优先最短有效答案
solonclaw.agent.personalities.concise.systemPrompt: 你是一个非常简洁的中文技术助手，只输出解决问题所需的最少内容。
solonclaw.agent.personalities.technical.description: 偏工程化，强调原因、边界与验证
solonclaw.agent.personalities.technical.systemPrompt: 你是一个工程导向的中文技术助手，回答时强调约束、原因、风险和验证方式。
solonclaw.agent.personalities.technical.tone: 冷静、直接
solonclaw.agent.personalities.technical.style: 优先用清晰术语描述系统行为和实现边界

# 飞书渠道
solonclaw.channels.feishu.enabled: false
solonclaw.channels.feishu.allowedUsers:
solonclaw.channels.feishu.dmPolicy: open
solonclaw.channels.feishu.groupPolicy: allowlist
solonclaw.channels.feishu.groupAllowedUsers:
solonclaw.channels.feishu.allowAllUsers: false
solonclaw.channels.feishu.unauthorizedDmBehavior: pair
solonclaw.channels.feishu.botOpenId:
solonclaw.channels.feishu.botUserId:
solonclaw.channels.feishu.botName:
solonclaw.channels.feishu.websocketUrl:
solonclaw.channels.feishu.toolProgress: all

# 钉钉渠道，仅支持 stream mode 入站与官方机器人出站
solonclaw.channels.dingtalk.enabled: false
solonclaw.channels.dingtalk.allowedUsers:
solonclaw.channels.dingtalk.dmPolicy: open
solonclaw.channels.dingtalk.groupPolicy: open
solonclaw.channels.dingtalk.groupAllowedUsers:
solonclaw.channels.dingtalk.allowAllUsers: false
solonclaw.channels.dingtalk.unauthorizedDmBehavior: pair
solonclaw.channels.dingtalk.robotCode:
solonclaw.channels.dingtalk.coolAppCode:
solonclaw.channels.dingtalk.streamUrl:
solonclaw.channels.dingtalk.toolProgress: all
solonclaw.channels.dingtalk.progressCardTemplateId:

# 企微渠道
solonclaw.channels.wecom.enabled: false
solonclaw.channels.wecom.allowedUsers:
solonclaw.channels.wecom.dmPolicy: open
solonclaw.channels.wecom.groupPolicy: open
solonclaw.channels.wecom.groupAllowedUsers:
solonclaw.channels.wecom.allowAllUsers: false
solonclaw.channels.wecom.unauthorizedDmBehavior: pair
solonclaw.channels.wecom.websocketUrl:
solonclaw.channels.wecom.toolProgress: all

# 微信渠道
solonclaw.channels.weixin.enabled: false
solonclaw.channels.weixin.allowedUsers:
solonclaw.channels.weixin.dmPolicy: open
solonclaw.channels.weixin.groupPolicy: disabled
solonclaw.channels.weixin.groupAllowedUsers:
solonclaw.channels.weixin.allowAllUsers: false
solonclaw.channels.weixin.unauthorizedDmBehavior: pair
solonclaw.channels.weixin.accountId:
solonclaw.channels.weixin.baseUrl: https://ilinkai.weixin.qq.com
solonclaw.channels.weixin.cdnBaseUrl: https://novac2c.cdn.weixin.qq.com/c2c
solonclaw.channels.weixin.longPollUrl:
solonclaw.channels.weixin.token:
solonclaw.channels.weixin.splitMultilineMessages: false
solonclaw.channels.weixin.sendChunkDelaySeconds: 0.35
solonclaw.channels.weixin.sendChunkRetries: 2
solonclaw.channels.weixin.sendChunkRetryDelaySeconds: 1.0
solonclaw.channels.weixin.toolProgress: off

# 全局网关授权兜底配置
solonclaw.gateway.allowedUsers:
solonclaw.gateway.allowAllUsers: false

# 版本检查与更新
solonclaw.update.repo:
solonclaw.update.releaseApiUrl:
solonclaw.update.tagsApiUrl:
solonclaw.update.httpProxy:

# GitHub / Skills Hub 认证
solonclaw.integrations.github.token:
solonclaw.integrations.github.cliToken:
solonclaw.integrations.github.appId:
solonclaw.integrations.github.privateKeyPath:
solonclaw.integrations.github.installationId:

# PDF 渲染
solonclaw.pdf.fontPath:
