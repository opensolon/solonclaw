<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw AI Agent</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==================== 设计系统变量 ==================== */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --neutral-50: #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-200: #e5e7eb;
            --neutral-300: #d1d5db;
            --neutral-400: #9ca3af;
            --neutral-500: #6b7280;
            --neutral-600: #4b5563;
            --neutral-700: #374151;
            --neutral-800: #1f2937;
            --neutral-900: #111827;

            --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            --card-hover-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

            --transition-fast: 150ms ease-in-out;
            --transition-normal: 200ms ease-in-out;
            --transition-slow: 300ms ease-in-out;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
        }

        /* ==================== 基础样式 ==================== */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--neutral-100);
            color: var(--neutral-800);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== 自定义滚动条 ==================== */
        .custom-scroll::-webkit-scrollbar {
            width: 7px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: var(--neutral-100);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--neutral-300);
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--neutral-400);
        }

        /* ==================== 卡片样式 ==================== */
        .card {
            background: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--neutral-200);
            transition: box-shadow var(--transition-normal);
        }
        .card:hover {
            box-shadow: var(--card-hover-shadow);
        }

        /* ==================== 按钮样式 ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        .btn-primary {
            background: var(--primary-color);
            color: #ffffff;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-secondary {
            background: var(--neutral-100);
            color: var(--neutral-700);
            border: 1px solid var(--neutral-200);
        }
        .btn-secondary:hover {
            background: var(--neutral-200);
        }
        .btn-icon {
            padding: 10px;
            border-radius: var(--radius-md);
        }

        /* ==================== 菜单项动画 ==================== */
        .menu-item {
            transition: all var(--transition-fast);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            margin-bottom: 4px;
        }
        .menu-item:hover {
            background: var(--neutral-100);
        }
        .menu-item.active {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            font-weight: 500;
        }
        .menu-item.active svg {
            color: var(--primary-color);
        }

        /* ==================== 页面切换动画 ==================== */
        .page-content {
            animation: fadeIn var(--transition-slow);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 焦点可见性 ==================== */
        *:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }
        button:focus-visible {
            outline-offset: 3px;
        }

        /* ==================== 状态指示器 ==================== */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-dot.online {
            background: var(--success-color);
        }
        .status-dot.offline {
            background: var(--danger-color);
        }
        .status-dot.pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ==================== 统计卡片 ==================== */
        .stat-card {
            background: #ffffff;
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--neutral-200);
            transition: all var(--transition-normal);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-hover-shadow);
        }
        .stat-label {
            font-size: 13px;
            color: var(--neutral-500);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--neutral-800);
            margin-top: 8px;
        }
        .stat-value.success { color: var(--success-color); }
        .stat-value.warning { color: var(--warning-color); }
        .stat-value.danger { color: var(--danger-color); }
        .stat-value.primary { color: var(--primary-color); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- 顶部导航栏 -->
    <header class="bg-white border-b border-gray-200 flex-shrink-0">
        <div class="flex items-center justify-between px-5 py-4">
            <div class="flex items-center space-x-4">
                <button id="menuToggle" class="p-2.5 hover:bg-gray-100 rounded-lg transition-colors lg:hidden">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div class="flex items-center space-x-3">
                    <div class="w-11 h-11 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center shadow-sm">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900 tracking-tight">SolonClaw</h1>
                        <p class="text-sm text-gray-500 font-medium">AI Agent 智能助手</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div id="statusIndicator" class="flex items-center space-x-2.5 bg-gray-50 px-3 py-2 rounded-lg border border-gray-200">
                    <span class="status-dot online pulse"></span>
                    <span class="text-sm font-medium text-gray-600">已连接</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="flex flex-1 overflow-hidden">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex-shrink-0 flex flex-col overflow-hidden transform -translate-x-full lg:translate-x-0 transition-transform duration-300 absolute lg:relative z-10 h-full">
            <nav class="flex-1 overflow-y-auto custom-scroll p-4">
                <div class="space-y-1">
                    <button onclick="switchPage('chat')" class="menu-item w-full flex items-center space-x-3 text-gray-700" data-page="chat">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                        <span>对话</span>
                    </button>
                    <button onclick="switchPage('tasks')" class="menu-item w-full flex items-center space-x-3 text-gray-700" data-page="tasks">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                        </svg>
                        <span>任务</span>
                    </button>
                    <button onclick="switchPage('skills')" class="menu-item w-full flex items-center space-x-3 text-gray-700" data-page="skills">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                        </svg>
                        <span>技能</span>
                    </button>
                    <button onclick="switchPage('mcp')" class="menu-item w-full flex items-center space-x-3 text-gray-700" data-page="mcp">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
                        </svg>
                        <span>MCP</span>
                    </button>
                    <button onclick="switchPage('logs')" class="menu-item w-full flex items-center space-x-3 text-gray-700" data-page="logs">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <span>日志</span>
                    </button>
                </div>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div class="text-xs text-gray-400 font-medium">
                    SolonClaw v1.0.0
                </div>
            </div>
        </aside>

        <!-- 侧边栏遮罩 -->
        <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/50 z-0 lg:hidden"></div>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-hidden bg-gray-50">
            <div id="pageContainer" class="h-full overflow-y-auto custom-scroll">
                <iframe id="contentFrame" class="w-full h-full border-0 bg-gray-50" src="pages/chat.html"></iframe>
            </div>
        </main>
    </div>

    <script src="RequestUtil.js?v=1.0"></script>
    <script src="main.js?v=1.0"></script>
</body>
</html>
