services:
  solon-claw:
    image: ghcr.io/chengliang4810/solon-claw:latest
    container_name: solon-claw
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SOLONCLAW_UID: "${SOLONCLAW_UID:-10000}"
      SOLONCLAW_GID: "${SOLONCLAW_GID:-10000}"
    volumes:
      - ./runtime:/app/runtime
