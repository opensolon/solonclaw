<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw - 日志查看</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
        }
        #logsContent {
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #logsContent::-webkit-scrollbar { width: 7px; }
        #logsContent::-webkit-scrollbar-track { background: #f3f4f6; }
        #logsContent::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
</head>
<body class="h-full flex flex-col p-5">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 overflow-hidden flex flex-col">
        <div class="border-b border-gray-200 px-5 py-4 flex items-center justify-between">
            <h2 class="text-lg font-bold text-gray-900 tracking-tight">系统日志</h2>
            <span class="text-xs text-gray-400">每 5 秒自动刷新</span>
        </div>
        <div id="logsContent" class="flex-1 overflow-y-auto p-4 text-gray-700">
            加载中...
        </div>
    </div>

    <script src="logs.js?v=2.0"></script>
</body>
</html>
