solon:
  app:
    name: solonclaw-test
  port: 12345
  env: dev
  ai:
    chat:
      openai:
        apiUrl: "https://api.openai.com/v1/chat/completions"
        apiKey: "sk-test-key-placeholder"
        provider: "openai"
        model: "gpt-4"

  # 序列化配置
  serialization:
    json:
      dateAsFormat: 'yyyy-MM-dd HH:mm:ss'
      dateAsTimeZone: 'GMT+8'
      nullAsWriteable: true

solonclaw:
  workspace: "./workspace-test"
  directories:
    mcpConfig: "mcp.json"
    skillsDir: "skills"
    jobsFile: "jobs.json"
    jobHistoryFile: "job-history.json"
    database: "memory-test.db"
    shellWorkspace: "workspace"
    logsDir: "logs"

  # 默认参数配置
  defaults:
    temperature: 0.7
    maxTokens: 4096
    timeoutSeconds: 120

  # Agent 配置
  agent:
    model:
      primary: "openai/gpt-4"
    maxHistoryMessages: 50
    maxToolIterations: 25

  tools:
    shell:
      enabled: true
      timeoutSeconds: 60
      maxOutputBytes: 1048576

  memory:
    enabled: true
    session:
      maxHistory: 50
    store:
      enabled: true

  # 自主运行配置（测试中禁用）
  autonomous:
    enabled: false
    runCron: "0/30 * * * * ?"
    maxConcurrentTasks: 3
    taskTimeoutSeconds: 60
    maxGoals: 10
    maxTaskQueueSize: 100
    autoSkillInstall: false
    autoReflection: false
    decisionConfidenceThreshold: 0.7
    cleanupIntervalHours: 24

  # 学习系统配置（测试中禁用）
  learning:
    enabled: false
    reflection:
      cron: "0 0 * * * ?"
      timeWindowHours: 1
      maxMessagesPerReflection: 200
    autoSkill:
      processCron: "0 */15 * * * ?"
      minConfidenceThreshold: 0.8
      autoApprovedPackages: []
      realtimeAnalysisEnabled: false
    knowledge:
      maxSearchResults: 5
      minConfidenceThreshold: 0.6